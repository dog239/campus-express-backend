server:
  port: 8080

spring:
  application:
    name: campus-express-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_express?useSSL=false&serverTimezone=Asia/Shanghai
    username: campus
    password: 123456

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  global-config:
    banner: false
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: campus-express-secret-key-2024-!@#abcXYZ
  expiration: 604800

wechat:
  appid: your-wechat-appid
  secret: your-wechat-secret
  session-url: https://api.weixin.qq.com/sns/jscode2session
  debug: true
