server:
  port: 8080

spring:
  application:
    name: campus-express-backend

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:campus_express;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
  global-config:
    banner: false
    db-config:
      id-type: AUTO
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: campus-express-secret-key-2024-!@#abcXYZ
  expiration: 604800

wechat:
  appid: your-wechat-appid
  secret: your-wechat-secret
  session-url: https://api.weixin.qq.com/sns/jscode2session
  debug: true

baidu:
  ocr:
    api-key: DTfR5EqnYhihCDUZ5mzuF5Ek
    secret-key: rffIP39mmOoFF13tnpZHZ4IFYBiOqkHj
    token-url: https://aip.baidubce.com/oauth/2.0/token
    general-url: https://aip.baidubce.com/rest/2.0/ocr/v1/general_basic
