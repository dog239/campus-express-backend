spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:campus_express;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
